<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Sign-Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        main {
            padding: 20px;
        }

        h1, h2 {
            color: #333;
            text-align: center;
        }

        section {
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            max-width: 800px;
            background: linear-gradient(90deg, #FFC82C, #ADB40E, #FFBD28, #FF9114, #A5B80F);
        }

        .activity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .activity-item {
            padding: 20px;
            width: 220px;
            text-align: center;
            color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            background: black;
        }

        .activity-item h3 {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .activity-item button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .activity-item button:hover {
            background-color: #555;
        }

    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div id="warning-placeholder"></div>
        <section>
            <h2>General Activities</h2>
            <div class="activity-list" id="general-list"></div>
        </section>
        <section>
            <h2>Workshops</h2>
            <div class="activity-list" id="workshops"></div>
        </section>
        <section>
            <h2>Debates</h2>
            <div class="activity-list" id="debate-list"></div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
    fetch("activities.php") // Fetch activities
        .then(response => response.json())
        .then(data => {
            let generalList = document.getElementById("general-list");
            let debateList = document.getElementById("debate-list");
            let workshopList = document.getElementById("workshops");

            // Clear the lists before adding new activities
            generalList.innerHTML = "";
            debateList.innerHTML = "";
            workshopList.innerHTML = "";

            // Iterate over the activities and display them based on their type
            data.forEach(activity => {
                let activityItem = document.createElement("div");
                activityItem.classList.add("activity-item");
                activityItem.innerHTML = `
                    <h3>${activity.nome}</h3>
                    <button onclick="toggleSignUp(this, ${activity.id})">Sign Up</button>
                `;

                if (activity.tipo === "General") {
                    generalList.appendChild(activityItem);
                } else if (activity.tipo === "Debate") {
                    debateList.appendChild(activityItem);
                } else if (activity.tipo === "Workshop") {
                    workshopList.appendChild(activityItem);
                }
            });
        })
        .catch(error => console.error("Error loading activities:", error));
});

function toggleSignUp(button, activity_id) {
    // Debug log; remove or comment out for production
    console.log("Button clicked for activity ID:", activity_id);

    fetch("signupactivities.php", {
        method: "POST",
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({
            activity_id: activity_id
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log("Response from server:", data); // Debug log
        if (data.success) {
            if (data.action === "signed_up") {
                button.innerHTML = "Unsubscribe";
            } else if (data.action === "unsubscribed") {
                button.innerHTML = "Sign Up";
            }
        } else {
            alert(data.message);
        }
    })
    .catch(error => console.error("Error toggling signup:", error));
}




        function loadPartial(file, target) {
    fetch(file)
        .then(response => response.ok ? response.text() : Promise.reject("Erro ao carregar " + file))
        .then(data => document.getElementById(target).innerHTML = data)
        .catch(error => console.error(error));
}

        loadPartial('header.html', 'header-placeholder');
        loadPartial('warning.php', 'warning-placeholder');
        loadPartial('footer.html', 'footer-placeholder');
    </script>
</body>
</html>
