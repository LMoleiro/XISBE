<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: auto; 
            min-height: 100vh; 
            overflow-y: auto; 

            width: auto; 
            min-width: 1300px;     
            overflow-x: auto;
            
            display: block;

        }
        
        .calendar-container {
            width: auto; 
            overflow-x: auto; /* Permite o scroll horizontal quando o conteúdo ultrapassa o tamanho */
            margin: 50px auto; /* Centraliza o conteúdo horizontalmente */
            place-items: center;
        }

        .qr-container {
            width: auto; 
            overflow-x: auto; /* Permite o scroll horizontal quando o conteúdo ultrapassa o tamanho */
            margin: 50px auto; /* Centraliza o conteúdo horizontalmente */
            place-items: center;
        }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(2, 2fr) 1fr 1fr 1fr 2fr 1fr 1fr; /* 1 time column + 5 day columns */
            grid-auto-rows: 75px; /* Default height for each time slot */
            grid-gap: 0px;
            width: 1200px;
            padding: 50px auto;
            border-radius: 15px; /* Arredonda os cantos */
            clip-path: inset(0 round 15px); /* Define o recorte arredondado */
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            
        }

        @media (max-width: 768px) {
            .calendar div {
                /*font-size: clamp(10px, 1.5vw, 16px); /* Ajuste menor */
                padding: 20px;
                text-align: center;
                transition: background-color 0.3s ease;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .calendar .header1 {
                font-size: 18px;
            }
        }
        
        .calendar div {
            /*font-size: clamp(12px, 2vw, 20px); /* Tamanho da fonte responsivo */
            padding: 7px; /* Remove padding */
            display: flex; /* Container flex para alinhar em coluna */
            flex-direction: column; /* Alinha elementos em coluna */
            gap: 2px; /* Pequeno espaço entre elementos */
            align-items: center; /* Alinha itens no topo */
            text-align: center; /* Adiciona alinhamento horizontal ao texto */
            justify-content: center; /* Centraliza o conteúdo horizontalmente */
            line-height: 1; /* Reduz o espaçamento vertical entre o texto */
        }
        
        .calendar div strong {
            display: block; /* Faz o título ocupar uma linha */
            margin: 0; /* Remove margens */
        }
        
        .calendar div small {
            display: block; /* Mostra a hora e o texto abaixo */
            margin: 0; /* Remove margens */
            font-size: 15px; /* Tamanho da fonte menor para a hora */
        }

        .calendar div br {
            margin: 0;
            line-height: 0; /* Para garantir que não haja espaço extra */
        }
        
        div span.info-text {
            color: blue;
            text-decoration: underline;
            font-size: 12px; /* Ajuste o tamanho conforme necessário */
            cursor: pointer; /* Adiciona um cursor de ponteiro ao passar o mouse */
        }
        
        /* Cursor pointer for cells with activities 
        .calendar div:not(.header1):not(.time-column):not(.empty-cell) {
            cursor: pointer; 
        }*/
        
        /* Cursor remains default for empty cells */
        div.calendar .empty-cell {
            cursor: default;
        }

        .calendar .header1 {
            background-color: rgba(255, 255, 255, 0.6);
            cursor: default;
            font-size: 24px;        
            display: flex; /* Define o container flex */
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center; /* Centraliza verticalmente */
        }

        .calendar div:first-child {
            border: none;
            cursor: default;
        }

        .calendar div:not(first-child) {
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.5);
            border-width: 1px;
        }

        p {
           margin-top: 2px;
           margin-bottom: 2px
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px); /* Efeito de desfoque */
        }


        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 20px;
            border-radius: 10px; /* Bordas arredondadas */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25); /* Sombra */
            width: 90%; /* Ocupa 90% da largura da tela em dispositivos menores */
            max-width: 750px; /* Limite máximo de largura */
            text-align: center;
            position: relative;
            animation: fadeIn 0.4s ease-out; /* Transição suave */
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-50%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }


        .close {
            color: #555; /* Cor neutra */
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close:hover, .close:focus {
            color: #e74c3c; /* Vermelho ao passar o mouse */
        }

        .open-modal-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .close-btn, .redirect-btn {
            display: inline-block;
            margin: 10px 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
         .close-btn {
            background-color: #ff4d4d;
            color: white;
         }
        
         .redirect-btn {
            background-color: #007bff;
            color: white;
            text-decoration: none;
         }
        
        
    </style>
</head>

function gerarHorarios(inicio, fim, intervalo) {
    let horarios = [];
    let horaAtual = inicio;
    let horaFim = fim;
    let [horasFinal, minutosFinal] = fim.split(':').map(Number);
    let [horas, minutos] = horaAtual.split(':').map(Number);
    let minutosaux = minutos
    while (horas < horasFinal + 1 || minutos <= minutosFinal) {
        horarios.push(`${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}`);
        minutos += intervalo;
        minutosaux = minutos
        if (minutos >= 60) {
            minutos = minutosaux - 60;
            horas++;
        }
    }
    return horarios;
}

function gerarOccupiedCells(horariosData, horarios) { 
    // To track cells that are part of spans
    const occupiedCells = new Set();
    horariosData.forEach(schedule => {
        const { startTime, endTime, ...dias } = schedule;
        const startTimeIndex = horarios.indexOf(startTime);
        const endTimeIndex = horarios.indexOf(endTime);
        for (const dia in dias) {
            const { position } = dias[dia];
            for (let j = startTimeIndex + 1; j < endTimeIndex; j++) {
                occupiedCells.add(`${horarios[j].replace(/:/g, '')}-${dia}`);
                if (dia === 'qui' && position === 'full') {
                    occupiedCells.add(`${horarios[j].replace(/:/g, '')}-qui2`);
                }
                if (dia === 'sex' && position === 'full') {
                    occupiedCells.add(`${horarios[j].replace(/:/g, '')}-sex2`);
                }
                if (dia === 'qua' && position === 'full') {
                   occupiedCells.add(`${horarios[j].replace(/:/g, '')}-qua2`);
                }
                
            }
        }
    });
    return occupiedCells;
}

function gerarCalendario() {
    const horarios = gerarHorarios('09:30', '20:00', 30); // Horários de 08:00 até 17:00
    console.log('horarios:', horarios);
    const calendar = document.querySelector('.calendar');
    const diasSemana = ['seg', 'ter', 'qua', 'qua2', 'qui', 'qui2', 'sex', 'sex2'];
    const quartaColunas = { left: 3, right: 4, full: '3 / 5' };
    const quintaColunas = { left: 5, right: 6, full: '5 / 7' }; // Map das colunas para quinta-feira
    const sextaColunas = { left: 7, right: 8, full: '7 / 9' }; // Map das colunas para sexta-feira
    const occupiedCells = gerarOccupiedCells(horariosData, horarios);
    console.log('OccupiedCells:', occupiedCells);
    /*
    for (let i = 0; i < horarios.length - 1; i++) { //cria coluna com os horários
        const timeColumn = document.createElement('div');
        timeColumn.classList.add('time-column');
        timeColumn.textContent = `${horarios[i]} - ${horarios[i + 1]}`;
        calendar.appendChild(timeColumn);
    }*/

    for (let rowIndex = 0; rowIndex < horarios.length - 1; rowIndex++) {
        for (let colIndex = 0; colIndex < diasSemana.length; colIndex++) { // Modificado para garantir 8 colunas
            const dia = diasSemana[colIndex];
            const horario = horarios[rowIndex];
            const cellId = `${horario.replace(/:/g, '')}-${dia}`;
    
            if (occupiedCells.has(cellId)) continue; // Siga para a próxima iteração se já estiver ocupada
    
            const cell = document.createElement('div');
            const schedule = horariosData.find(item => item.startTime === horario && item[dia]);
    
            if (schedule) {
                const { activity, color, fontColor, position, description, room, type } = schedule[dia];
    
                if (dia === 'qui' && position === 'full') occupiedCells.add(`${horario.replace(/:/g, '')}-qui2`);
                if (dia === 'sex' && position === 'full') occupiedCells.add(`${horario.replace(/:/g, '')}-sex2`);

                    <p><strong>${activity}</strong></p>
                    <p><small>${schedule.startTime} - ${schedule.endTime}</small></p>
                    <p><small>${room}</small></p>`

                cell.id = cellId;
                cell.innerHTML = formattedText;
                cell.style.backgroundColor = color;
                cell.style.color = fontColor;

                    cell.addEventListener('click', () => mostrarInfo(cellId, activity, type, room, description));

                const startTimeIndex = horarios.indexOf(schedule.startTime);
                const endTimeIndex = horarios.indexOf(schedule.endTime);

                // Atribuição correta de gridColumn para garantir 7 colunas

                    cell.style.gridColumn = `${colIndex + 1}`; // Ajuste para 7 colunas

                if (activity !== 'Coffee Break') cell.style.cursor = 'pointer';
                calendar.appendChild(cell);
                cell.style.borderColor = "rgba(255, 255, 255, 0.5)";
            } else {
                // Células vazias
                if (dia === 'qui' && !occupiedCells.has(`${horario.replace(/:/g, '')}-qui2`)) {
                    cell.style.gridColumn = quintaColunas.full;
                } else if (dia === 'sex' && !occupiedCells.has(`${horario.replace(/:/g, '')}-sex2`)) {
                    cell.style.gridColumn = sextaColunas.full;
                } else if (dia === 'qua' && !occupiedCells.has(`${horario.replace(/:/g, '')}-qua2`)) {
                    cell.style.gridColumn = quartaColunas.full;

                    cell.style.gridColumn = `${colIndex + 1}`;
                }

                if (dia === 'qui') occupiedCells.add(`${horario.replace(/:/g, '')}-qui2`);
                if (dia === 'sex') occupiedCells.add(`${horario.replace(/:/g, '')}-sex2`);
                if (dia === 'qua') occupiedCells.add(`${horario.replace(/:/g, '')}-qua2`);
                cell.style.gridRow = `${rowIndex + 2}`;
                cell.style.backgroundColor = 'rgba(255, 255, 255, 0.3)';
                cell.classList.add('empty-cell');
                calendar.appendChild(cell);
            }
        }
    }
}


function mostrarInfo(id, atividade, type, room, description) {
    const cell = document.getElementById(id);
    const horario = cell.querySelector('small');
    document.getElementById("modalInfo").innerHTML = `<strong>${atividade}</strong><br><br><p>${type}</p><small>${horario.textContent}</small><br><small>${room}</small><br><small>${description}</small><br><small></small>`;

    const modalButton = document.getElementById("modalButton");
    modalButton.textContent = "Discover +"; // Texto do botão
    modalButton.setAttribute("href", "activities.html"); // Define o link
    
    document.getElementById("myModal").style.display = "block";
}

function fecharModal() {
    document.getElementById("myModal").style.display = "none";
}

window.onclick = function(event) {
    if (event.target == document.getElementById("myModal")) {
        document.getElementById("myModal").style.display = "none";
    }
};

window.onload = gerarCalendario;




// Função para carregar Header e Footer
function loadPartial(file, target) {
    fetch(file)
        .then(response => {
            if (response.ok) {
                return response.text();
            } else {
                throw new Error(`Erro ${response.status}: Não foi possível carregar ${file}`);
            }
        })
        .then(data => {
            document.getElementById(target).innerHTML = data;
        })
        .catch(error => console.error(`Erro ao carregar ${file}:`, error));
}

// Carregar o Header e o Footer
loadPartial('header.html', 'header-placeholder');
loadPartial('footer.html', 'footer-placeholder');
